packages:
  "framer-motion": "For page transitions, subtle entry animations, and hero section dynamics"
  "react-hook-form": "For robust form state management and validation"
  "@hookform/resolvers": "Zod resolvers for integrating with react-hook-form"
  "date-fns": "For formatting dates and timestamps consistently"
  "react-dropzone": "For file upload drag-and-drop areas"

images:
  - path: "artifacts/originlock/public/images/hero-bg.png"
    description: "Abstract geometric background in deep dark navy and cyan, glowing cryptographic nodes, high-tech security feel, legal infrastructure, subtle light leaks"
    aspect_ratio: "16:9"
  - path: "artifacts/originlock/public/images/auth-bg.png"
    description: "Minimalist dark graphite background with subtle teal glowing lines representing data immutability and timestamps"
    aspect_ratio: "9:16"

notes:
  - Using generated API hooks from @workspace/api-client-react
  - Session-based authentication managed via cookies (checked with /api/auth/me)
  - SHA-256 local verification computed using Web Crypto API window.crypto.subtle
